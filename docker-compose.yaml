version: '3.8'

services:
  backend:
    build:
      dockerfile: backend/Dockerfile
      context: .
    ports:
      - "8003:8003"

  frontend:
    build:
      dockerfile: frontend/Dockerfile
      context: .
    ports:
      - "8004:8004"
    environment:
      - BACKEND_URL=http://backend:8003
    depends_on:
      - backend